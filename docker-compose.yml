services:
  backend:
    build:
      context: ./backend
      # Skip BuildKit provenance/SBOM attestations — they add significant
      # time to local builds (the "resolving provenance for metadata file"
      # step) and aren't used in this project. Re-enable per-build with
      # `docker buildx build --provenance=true` if ever needed.
      x-bake:
        provenance: false
        sbom: false
    volumes:
      - ./data/input:/data/input:ro       # Source CSVs — read-only
      - ./data/output:/data/output        # Success/error result CSVs
      - ./data/db:/data/db                # SQLite database
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      x-bake:
        provenance: false
        sbom: false
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
