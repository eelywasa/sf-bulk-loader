# PostgreSQL override for docker-compose.yml
#
# Use this file when you want to run the app with PostgreSQL instead of SQLite.
# This is recommended for multi-user or production-style self-hosted installs.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml up --build
#
# The ./data/db volume from docker-compose.yml is unused when PostgreSQL is active.
#
# ⚠️  IMPORTANT — change the default credentials before deploying to any non-local environment.
# The values below are for local development only. Update POSTGRES_PASSWORD and the
# DATABASE_URL password to a strong, unique value, or set them via a .env file:
#
#   POSTGRES_PASSWORD=your-strong-password
#   DATABASE_URL=postgresql+asyncpg://bulk_loader:your-strong-password@postgres:5432/bulk_loader

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bulk_loader
      POSTGRES_USER: bulk_loader
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bulk_loader}  # Change for non-local deployments
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bulk_loader"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://bulk_loader:bulk_loader@postgres:5432/bulk_loader}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
