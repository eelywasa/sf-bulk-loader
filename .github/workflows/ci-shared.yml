name: Shared Quality Checks

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend-test:
    name: Backend Tests (${{ matrix.db }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - db: sqlite
            test_db_url: ""
          - db: postgres
            test_db_url: "postgresql+asyncpg://postgres:postgres@localhost:5432/bulk_loader_test"

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bulk_loader_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Run tests
        working-directory: backend
        env:
          # Non-empty placeholder so Pydantic Settings passes validation at import time.
          # conftest.py generates a real Fernet key via os.environ.setdefault before any
          # crypto operations, so this value is never used for actual encryption in tests.
          ENCRYPTION_KEY: "dGVzdC1vbmx5LWtleS1ub3QtdXNlZC1pbi1wcm9kdWN0aW9uLS0tLS0="
          TEST_DATABASE_URL: ${{ matrix.test_db_url }}
        run: pytest -x -q

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Type check
        run: npm run typecheck
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  config-validate:
    name: Config Profile Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Validate distribution profile enforcement
        working-directory: backend
        # Each python -c invocation is a fresh process — no module caching between checks.
        # Pydantic v2 wraps model_validator ValueError in ValidationError (subclass of
        # Exception but NOT ValueError), so the aws_hosted rejection test catches Exception.
        run: |
          python -c "
          import os
          os.environ.update({'APP_DISTRIBUTION': 'self_hosted', 'ENCRYPTION_KEY': 'dGVzdA==', 'JWT_SECRET_KEY': 'test'})
          from app.config import settings
          assert settings.auth_mode == 'local', f'Expected local, got {settings.auth_mode}'
          assert settings.transport_mode == 'http', f'Expected http, got {settings.transport_mode}'
          print('self_hosted profile: OK')
          "

          python -c "
          import os
          os.environ.update({'APP_DISTRIBUTION': 'desktop', 'ENCRYPTION_KEY': 'dGVzdA==', 'JWT_SECRET_KEY': 'test'})
          from app.config import settings
          assert settings.auth_mode == 'none', f'Expected none, got {settings.auth_mode}'
          assert settings.transport_mode == 'local', f'Expected local, got {settings.transport_mode}'
          print('desktop profile: OK')
          "

          python -c "
          import os, sys
          os.environ.update({'APP_DISTRIBUTION': 'aws_hosted', 'ENCRYPTION_KEY': 'dGVzdA==', 'JWT_SECRET_KEY': 'test'})
          raised = False
          try:
              from app.config import settings
          except Exception as e:
              raised = True
              assert 'PostgreSQL' in str(e), f'Unexpected error: {e}'
              print('aws_hosted correctly rejects SQLite DATABASE_URL: OK')
          if not raised:
              print('ERROR: aws_hosted should have rejected SQLite DATABASE_URL', file=sys.stderr)
              sys.exit(1)
          "
