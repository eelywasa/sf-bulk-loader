name: Docker Distribution

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-sqlite:
    name: Docker Smoke Test (SQLite)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Buildx with GHA cache speeds up repeated builds across runs for both
      # backend and frontend images. COMPOSE_BAKE=true (set below) makes
      # Compose delegate to buildx bake so it picks up the cache backend.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create data directories
        # data/db and data/output are mounted as writable volumes into the container
        # which runs as appuser (non-root). chmod ensures appuser can write even though
        # the host directories are created by root on the CI runner.
        run: |
          mkdir -p data/input data/output data/db
          chmod 777 data/db data/output

      - name: Create CI env file
        # ENCRYPTION_KEY and JWT_SECRET_KEY are intentionally omitted — the backend
        # auto-generates them on first start and writes to /data/db/*.key (writable volume).
        # ADMIN_USERNAME/PASSWORD are required on first boot to seed the initial admin user.
        run: |
          echo 'APP_DISTRIBUTION=self_hosted' > .env
          echo 'ADMIN_USERNAME=ci-admin' >> .env
          echo 'ADMIN_PASSWORD=CIpassword1!' >> .env

      - name: Build and start (SQLite mode)
        run: docker compose up -d --build --wait --timeout 120
        env:
          COMPOSE_BAKE: true

      - name: Verify backend health
        run: |
          curl -sf http://localhost/api/health \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['status'] == 'ok', f'Expected status ok, got: {d}'
          print('Health check passed:', d)
          "

      - name: Verify auth enforcement
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/api/connections/)
          echo "Unauthenticated /api/connections/ → HTTP $STATUS"
          test "$STATUS" = "401" || (echo "Expected 401, got $STATUS" && exit 1)

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  smoke-postgres:
    name: Docker Smoke Test (PostgreSQL)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create data directories
        run: |
          mkdir -p data/input data/output data/db
          chmod 777 data/db data/output

      - name: Create CI env file
        run: |
          echo 'APP_DISTRIBUTION=self_hosted' > .env
          echo 'ADMIN_USERNAME=ci-admin' >> .env
          echo 'ADMIN_PASSWORD=CIpassword1!' >> .env

      - name: Build and start (PostgreSQL mode)
        run: docker compose -f docker-compose.yml -f docker-compose.postgres.yml up -d --build --wait --timeout 120
        env:
          COMPOSE_BAKE: true

      - name: Verify backend health
        run: |
          curl -sf http://localhost/api/health \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['status'] == 'ok', f'Expected status ok, got: {d}'
          print('Health check passed:', d)
          "

      - name: Verify auth enforcement
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/api/connections/)
          echo "Unauthenticated /api/connections/ → HTTP $STATUS"
          test "$STATUS" = "401" || (echo "Expected 401, got $STATUS" && exit 1)

      - name: Dump container logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.postgres.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.postgres.yml down -v
