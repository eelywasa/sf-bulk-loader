name: Docker Distribution

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  # Detect which parts of the codebase changed so smoke tests can skip
  # themselves when their source tree is untouched.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    if: true
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker:
              - 'backend/**'
              - 'frontend/**'
              - 'docs/usage/**'
              - 'docker-compose*.yml'
              - '**/Dockerfile'
              - '.github/workflows/ci-docker.yml'

  smoke-sqlite:
    name: Docker Smoke Test (SQLite)
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed so git describe can walk back to find tags

      - name: Compute version
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            BASE="${GITHUB_REF_NAME#v}"
            VERSION="${BASE}.${{ github.run_number }}"
          else
            LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0")
            BASE="${LATEST#v}"
            VERSION="${BASE}.${{ github.run_number }}-dev"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "git_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "build_time=$(date -u +%FT%TZ)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create data directories
        # data/db and data/output are mounted as writable volumes into the container
        # which runs as appuser (non-root). chmod ensures appuser can write even though
        # the host directories are created by root on the CI runner.
        run: |
          mkdir -p data/input data/output data/db
          chmod 777 data/db data/output

      - name: Create CI env file
        # ENCRYPTION_KEY and JWT_SECRET_KEY are intentionally omitted — the backend
        # auto-generates them on first start and writes to /data/db/*.key (writable volume).
        # ADMIN_EMAIL/PASSWORD are required on first boot to seed the initial admin user.
        run: |
          echo 'APP_DISTRIBUTION=self_hosted' > .env
          echo 'ADMIN_EMAIL=ci-admin@example.com' >> .env
          echo 'ADMIN_PASSWORD=CIpassword1!' >> .env

      - name: Build backend image (with layer cache)
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          load: true
          tags: sfbl-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.version }}
            GIT_SHA=${{ steps.ver.outputs.git_sha }}
            BUILD_TIME=${{ steps.ver.outputs.build_time }}

      - name: Build frontend image (with layer cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: false
          load: true
          tags: sfbl-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start (SQLite mode)
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --wait --timeout 120

      - name: Verify backend health
        run: |
          curl -sf http://localhost/api/health \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['status'] == 'ok', f'Expected status ok, got: {d}'
          print('Health check passed:', d)
          "

      - name: Verify auth enforcement
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/api/connections/)
          echo "Unauthenticated /api/connections/ → HTTP $STATUS"
          test "$STATUS" = "401" || (echo "Expected 401, got $STATUS" && exit 1)

      - name: Dump container logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v

  smoke-postgres:
    name: Docker Smoke Test (PostgreSQL)
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed so git describe can walk back to find tags

      - name: Compute version
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            BASE="${GITHUB_REF_NAME#v}"
            VERSION="${BASE}.${{ github.run_number }}"
          else
            LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0")
            BASE="${LATEST#v}"
            VERSION="${BASE}.${{ github.run_number }}-dev"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "git_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "build_time=$(date -u +%FT%TZ)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create data directories
        run: |
          mkdir -p data/input data/output data/db
          chmod 777 data/db data/output

      - name: Create CI env file
        run: |
          echo 'APP_DISTRIBUTION=self_hosted' > .env
          echo 'ADMIN_EMAIL=ci-admin@example.com' >> .env
          echo 'ADMIN_PASSWORD=CIpassword1!' >> .env

      - name: Build backend image (with layer cache)
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          load: true
          tags: sfbl-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.version }}
            GIT_SHA=${{ steps.ver.outputs.git_sha }}
            BUILD_TIME=${{ steps.ver.outputs.build_time }}

      - name: Build frontend image (with layer cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: false
          load: true
          tags: sfbl-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start (PostgreSQL mode)
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.postgres.yml up -d --wait --timeout 120

      - name: Verify backend health
        run: |
          curl -sf http://localhost/api/health \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['status'] == 'ok', f'Expected status ok, got: {d}'
          print('Health check passed:', d)
          "

      - name: Verify auth enforcement
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/api/connections/)
          echo "Unauthenticated /api/connections/ → HTTP $STATUS"
          test "$STATUS" = "401" || (echo "Expected 401, got $STATUS" && exit 1)

      - name: Dump container logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.postgres.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.postgres.yml down -v
