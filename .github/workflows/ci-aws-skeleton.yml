name: AWS Skeleton Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which parts of the codebase changed so CDK synth can skip
  # itself when infrastructure is untouched.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'infrastructure/**'
              - '.github/workflows/ci-aws-skeleton.yml'

  cdk-synth:
    name: CDK Synth
    needs: changes
    # Always run on push to main; on PRs only when infrastructure files changed.
    if: >-
      github.event_name == 'push' ||
      needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CDK dependencies
        run: npm ci
        working-directory: infrastructure

      - name: TypeScript compile check
        # Validates that all stack definitions compile cleanly before synthesis.
        run: npm run build
        working-directory: infrastructure

      - name: Synthesise CloudFormation templates
        # Validates that all four stacks (Network, Data, Backend, Frontend) are
        # structurally sound. No AWS credentials or live deployment required.
        run: npx cdk synth -c env=staging
        working-directory: infrastructure
