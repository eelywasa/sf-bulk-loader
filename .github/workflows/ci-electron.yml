name: Electron Desktop CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Steps are identical for all platforms; the two jobs below differ only in
# which runners they target and when they run. Linux runs on every push/PR;
# macOS and Windows only run on push to main (expensive runners).

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    if: true
    outputs:
      electron: ${{ steps.filter.outputs.electron }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            electron:
              - 'electron/**'
              - 'frontend/**'
              - 'backend/**'
              - 'backend/requirements-desktop.txt'
              - 'docs/usage/**'
              - '.github/workflows/ci-electron.yml'

  build-and-smoke-linux:
    name: Electron Build & Smoke Test (linux-x64)
    needs: changes
    if: needs.changes.outputs.electron == 'true'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            electron/package-lock.json
            frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-desktop.txt

      - name: Install backend dependencies + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-desktop.txt pyinstaller
        working-directory: backend

      - name: Cache PyInstaller binary
        id: pyinstaller-cache
        uses: actions/cache@v4
        with:
          path: backend/dist/sf_bulk_loader
          key: pyinstaller-${{ runner.os }}-${{ hashFiles('backend/**/*.py', 'backend/requirements-desktop.txt', 'backend/sf_bulk_loader.spec', 'backend/alembic.ini', 'backend/alembic/**', '.github/workflows/ci-electron.yml') }}

      - name: Build PyInstaller binary
        if: steps.pyinstaller-cache.outputs.cache-hit != 'true'
        run: pyinstaller sf_bulk_loader.spec --clean --noconfirm
        working-directory: backend

      - name: Build frontend (desktop mode)
        run: npm ci && npm run build:desktop
        working-directory: frontend

      - name: Install Electron dependencies
        run: npm ci
        working-directory: electron

      - name: Package unpacked desktop app
        run: npm run dist -- --linux dir
        working-directory: electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Smoke packaged app
        run: xvfb-run -a node scripts/smoke-packaged.js linux
        working-directory: electron

      - name: Upload unpacked artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sf-bulk-loader-linux-x64-${{ github.sha }}
          path: electron/dist/linux-unpacked/**
          retention-days: 1

  build-and-smoke-native:
    name: Electron Build & Smoke Test (${{ matrix.artifact_suffix }})
    needs: changes
    # macOS and Windows are expensive runners — only run on push to main.
    if: github.event_name == 'push' && needs.changes.outputs.electron == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: mac
            artifact_suffix: mac-arm64
            dir_args: --mac dir
            artifact_path: electron/dist/mac-arm64/**/*.app
          - os: windows-2025
            platform: win
            artifact_suffix: windows-x64
            dir_args: --win dir
            artifact_path: electron/dist/win-unpacked/**

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            electron/package-lock.json
            frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-desktop.txt

      - name: Install backend dependencies + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-desktop.txt pyinstaller
        working-directory: backend

      - name: Cache PyInstaller binary
        id: pyinstaller-cache
        uses: actions/cache@v4
        with:
          path: backend/dist/sf_bulk_loader
          key: pyinstaller-${{ runner.os }}-${{ hashFiles('backend/**/*.py', 'backend/requirements-desktop.txt', 'backend/sf_bulk_loader.spec', 'backend/alembic.ini', 'backend/alembic/**', '.github/workflows/ci-electron.yml') }}

      - name: Build PyInstaller binary
        if: steps.pyinstaller-cache.outputs.cache-hit != 'true'
        run: pyinstaller sf_bulk_loader.spec --clean --noconfirm
        working-directory: backend

      - name: Build frontend (desktop mode)
        run: npm ci && npm run build:desktop
        working-directory: frontend

      - name: Install Electron dependencies
        run: npm ci
        working-directory: electron

      - name: Package unpacked desktop app
        run: npm run dist -- ${{ matrix.dir_args }}
        working-directory: electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Smoke packaged app
        run: node scripts/smoke-packaged.js ${{ matrix.platform }}
        working-directory: electron

      - name: Upload unpacked artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sf-bulk-loader-${{ matrix.artifact_suffix }}-${{ github.sha }}
          path: ${{ matrix.artifact_path }}
          retention-days: 1
