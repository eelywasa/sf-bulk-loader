name: Backend tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: pytest (${{ matrix.db }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - db: sqlite
            test_db_url: ""
          - db: postgres
            test_db_url: "postgresql+asyncpg://postgres:postgres@localhost:5432/bulk_loader_test"

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bulk_loader_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Run tests
        working-directory: backend
        env:
          # Pydantic Settings reads ENCRYPTION_KEY at import time; conftest
          # generates its own Fernet key via setdefault so this value is only
          # used to pass validation — it is never used for real encryption in tests.
          ENCRYPTION_KEY: "dGVzdC1vbmx5LWtleS1ub3QtdXNlZC1pbi1wcm9kdWN0aW9uLS0tLS0="
          TEST_DATABASE_URL: ${{ matrix.test_db_url }}
        run: pytest -x -q
