name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  packages: write

jobs:
  docker-publish:
    name: Publish Docker Images to GHCR
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sf-bulk-loader-backend:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/sf-bulk-loader-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sf-bulk-loader-frontend:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/sf-bulk-loader-frontend:latest

  electron-release:
    name: Build Electron — ${{ matrix.artifact-suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest   # arm64 (Apple Silicon)
            artifact-suffix: mac-arm64
          - os: windows-latest
            artifact-suffix: windows-x64
          - os: ubuntu-latest
            artifact-suffix: linux-x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-desktop.txt pyinstaller
        working-directory: backend

      - name: Build PyInstaller binary
        run: pyinstaller sf_bulk_loader.spec --clean --noconfirm
        working-directory: backend

      - name: Build frontend (desktop mode)
        run: npm ci && npm run build:desktop
        working-directory: frontend

      - name: Install Electron dependencies
        run: npm install
        working-directory: electron

      - name: Set version from tag
        # Stamps the version in package.json from the git tag (e.g. v0.2.0 → 0.2.0)
        # so electron-builder uses the correct version in output filenames.
        # npm version accepts the v-prefixed tag directly. --no-git-tag-version
        # prevents npm from creating a conflicting git tag.
        run: npm version ${{ github.ref_name }} --no-git-tag-version --allow-same-version
        working-directory: electron

      - name: Package with electron-builder
        # CSC_IDENTITY_AUTO_DISCOVERY=false suppresses keychain signing lookup in CI.
        #
        # Future signing (requires Apple Developer account — add as GitHub Actions secrets):
        #   CSC_LINK: ${{ secrets.MACOS_CERTIFICATE_P12 }}
        #   CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        #   APPLE_ID: ${{ secrets.APPLE_ID }}
        #   APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        #   APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run dist
        working-directory: electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Attach artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            electron/dist/*.zip
            electron/dist/*.exe
            electron/dist/*.AppImage
