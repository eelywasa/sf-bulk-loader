name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  packages: write

jobs:
  docker-publish:
    name: Publish Docker Images to GHCR
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sf-bulk-loader-backend:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/sf-bulk-loader-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sf-bulk-loader-frontend:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/sf-bulk-loader-frontend:latest

  electron-release:
    name: Build Electron — ${{ matrix.artifact_suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: mac
            artifact_suffix: mac-arm64
            dir_args: --mac dir
            release_args: --mac zip
            release_glob: electron/dist/*.zip
          - os: windows-2025
            platform: win
            artifact_suffix: windows-x64
            dir_args: --win dir
            release_args: --win nsis
            release_glob: electron/dist/*.exe
          - os: ubuntu-24.04
            platform: linux
            artifact_suffix: linux-x64
            dir_args: --linux dir
            release_args: --linux AppImage
            release_glob: electron/dist/*.AppImage

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            electron/package-lock.json
            frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-desktop.txt

      - name: Install backend dependencies + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-desktop.txt pyinstaller
        working-directory: backend

      - name: Build PyInstaller binary
        run: pyinstaller sf_bulk_loader.spec --clean --noconfirm
        working-directory: backend

      - name: Build frontend (desktop mode)
        run: npm ci && npm run build:desktop
        working-directory: frontend

      - name: Install Electron dependencies
        run: npm ci
        working-directory: electron

      - name: Set version from tag
        # Stamps the version in package.json from the git tag (e.g. v0.2.0 → 0.2.0)
        # so electron-builder uses the correct version in output filenames.
        # npm version accepts the v-prefixed tag directly. --no-git-tag-version
        # prevents npm from creating a conflicting git tag.
        run: npm version ${{ github.ref_name }} --no-git-tag-version --allow-same-version
        working-directory: electron

      - name: Build unpacked desktop app
        run: npm run dist -- ${{ matrix.dir_args }}
        working-directory: electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Smoke packaged app (macOS/Windows)
        if: matrix.platform != 'linux'
        run: node scripts/smoke-packaged.js ${{ matrix.platform }}
        working-directory: electron

      - name: Smoke packaged app (Linux)
        if: matrix.platform == 'linux'
        run: xvfb-run -a node scripts/smoke-packaged.js linux
        working-directory: electron

      - name: Build release artifact
        run: npm run dist -- ${{ matrix.release_args }}
        working-directory: electron
        env:
          # macOS: sign with Developer ID Application cert from GitHub secrets.
          # Non-mac legs leave CSC_LINK unset so electron-builder skips signing naturally.
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          # Notarization (mac only — notarize.js is a no-op when APPLE_ID is unset)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Attach artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.release_glob }}
