name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+"

permissions:
  contents: write
  packages: write

jobs:
  # Build each image natively on its target architecture, then merge into a
  # multi-platform manifest. This avoids QEMU emulation (10-20x slower) by
  # running arm64 builds on GitHub's native ubuntu-24.04-arm runners.
  docker-build:
    name: Docker — ${{ matrix.image }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - image: backend
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - image: frontend
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - image: frontend
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: ver
        run: |
          BASE="${GITHUB_REF_NAME#v}"
          VERSION="${BASE}.${{ github.run_number }}"
          GIT_SHA=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +%FT%TZ)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "git_sha=${GIT_SHA}" >> $GITHUB_OUTPUT
          echo "build_time=${BUILD_TIME}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        if: matrix.image == 'backend'
        uses: docker/build-push-action@v6
        with:
          context: backend
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/sf-bulk-loader-backend:${{ steps.ver.outputs.version }}-${{ matrix.arch }}
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.version }}
            GIT_SHA=${{ steps.ver.outputs.git_sha }}
            BUILD_TIME=${{ steps.ver.outputs.build_time }}

      - name: Build and push frontend image
        if: matrix.image == 'frontend'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/sf-bulk-loader-frontend:${{ steps.ver.outputs.version }}-${{ matrix.arch }}

  docker-merge:
    name: Docker — merge multi-platform manifests
    needs: docker-build
    runs-on: ubuntu-latest

    steps:
      - name: Compute version
        id: ver
        run: |
          BASE="${GITHUB_REF_NAME#v}"
          VERSION="${BASE}.${{ github.run_number }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge backend manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository_owner }}/sf-bulk-loader-backend:${{ steps.ver.outputs.version }} \
            -t ghcr.io/${{ github.repository_owner }}/sf-bulk-loader-backend:latest \
            ghcr.io/${{ github.repository_owner }}/sf-bulk-loader-backend:${{ steps.ver.outputs.version }}-amd64 \
            ghcr.io/${{ github.repository_owner }}/sf-bulk-loader-backend:${{ steps.ver.outputs.version }}-arm64

      - name: Merge frontend manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository_owner }}/sf-bulk-loader-frontend:${{ steps.ver.outputs.version }} \
            -t ghcr.io/${{ github.repository_owner }}/sf-bulk-loader-frontend:latest \
            ghcr.io/${{ github.repository_owner }}/sf-bulk-loader-frontend:${{ steps.ver.outputs.version }}-amd64 \
            ghcr.io/${{ github.repository_owner }}/sf-bulk-loader-frontend:${{ steps.ver.outputs.version }}-arm64

  electron-release:
    name: Build Electron — ${{ matrix.artifact_suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: mac
            artifact_suffix: mac-arm64
            dir_args: --mac dir
            release_args: --mac zip
            release_glob: electron/dist/*.zip
          - os: windows-2025
            platform: win
            artifact_suffix: windows-x64
            dir_args: --win dir
            release_args: --win nsis
            release_glob: electron/dist/*.exe
          - os: ubuntu-24.04
            platform: linux
            artifact_suffix: linux-x64
            dir_args: --linux dir
            release_args: --linux AppImage
            release_glob: electron/dist/*.AppImage

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed so git describe can walk back to find tags

      - name: Compute version
        id: ver
        shell: bash
        run: |
          BASE="${GITHUB_REF_NAME#v}"
          VERSION="${BASE}.${{ github.run_number }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            electron/package-lock.json
            frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-desktop.txt

      - name: Install backend dependencies + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-desktop.txt pyinstaller
        working-directory: backend

      - name: Build PyInstaller binary
        run: pyinstaller sf_bulk_loader.spec --clean --noconfirm
        working-directory: backend

      - name: Build frontend (desktop mode)
        run: npm ci && npm run build:desktop
        working-directory: frontend

      - name: Install Electron dependencies
        run: npm ci
        working-directory: electron

      - name: Set version from computed version
        # Stamps the computed version (e.g. 0.8.312) into package.json so
        # electron-builder uses the correct version in output filenames.
        run: npm version ${{ steps.ver.outputs.version }} --no-git-tag-version --allow-same-version
        working-directory: electron

      - name: Build unpacked desktop app
        run: npm run dist -- ${{ matrix.dir_args }}
        working-directory: electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Smoke packaged app (macOS/Windows)
        if: matrix.platform != 'linux'
        run: node scripts/smoke-packaged.js ${{ matrix.platform }}
        working-directory: electron

      - name: Smoke packaged app (Linux)
        if: matrix.platform == 'linux'
        run: xvfb-run -a node scripts/smoke-packaged.js linux
        working-directory: electron

      - name: Build release artifact
        run: npm run dist -- ${{ matrix.release_args }}
        working-directory: electron
        env:
          # macOS: sign with Developer ID Application cert from GitHub secrets.
          # Non-mac legs leave CSC_LINK unset so electron-builder skips signing naturally.
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          # Notarization (mac only — notarize.js is a no-op when APPLE_ID is unset)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Attach artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.release_glob }}
